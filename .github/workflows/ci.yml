name: Churn Prediction CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "pathspec==0.11.2"
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python -m pytest src/tests/ -v --tb=short

      - name: Run DVC pipeline (data → features → train)
        run: |
          dvc repro

      - name: Check model metrics
        run: |
          python -c "
          import json
          with open('metrics.json') as f:
              m = json.load(f)
          f1 = m.get('test_f1', m.get('f1', 0))
          roc_auc = m.get('test_roc_auc', m.get('roc_auc', 0))
          assert f1 >= 0.52, f'F1 {f1:.4f} below acceptance threshold 0.52'
          assert roc_auc >= 0.60, f'ROC-AUC {roc_auc:.4f} below acceptance threshold 0.60'
          print(f'test_f1={f1:.4f}  test_roc_auc={roc_auc:.4f}  — PASSED')
          "

      - name: Upload artifacts for build job
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            src/api/artifacts/best_model.pkl
            src/api/artifacts/model_metadata.json
            src/api/artifacts/feature_importances.json
            src/api/artifacts/scaler.pkl
            src/api/artifacts/label_encoders.pkl
            src/api/artifacts/feature_names.json
            config/baseline_stats.json
            metrics.json

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download model artifacts from test job
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: .

      - name: Restore artifact directory structure
        run: |
          mkdir -p src/api/artifacts config
          mv best_model.pkl model_metadata.json feature_importances.json \
             scaler.pkl label_encoders.pkl feature_names.json src/api/artifacts/ 2>/dev/null || true
          mv baseline_stats.json config/ 2>/dev/null || true

      - name: Build API Docker image
        run: docker build -f docker/Dockerfile.api -t churn-api:${{ github.sha }} .

      - name: Build Frontend Docker image
        run: docker build -f docker/Dockerfile.frontend -t churn-frontend:${{ github.sha }} .

      - name: Docker Compose smoke test
        run: |
          docker-compose up -d api
          echo "Waiting for API to be ready..."
          for i in $(seq 1 15); do
            curl -sf http://localhost:8000/health && break
            echo "Attempt $i/15 — not ready yet, retrying in 5s"
            sleep 5
          done
          curl -f http://localhost:8000/health || (docker-compose logs api && exit 1)
          curl -sf http://localhost:8000/ready || echo "Warning: /ready endpoint not responding"
          docker-compose down
