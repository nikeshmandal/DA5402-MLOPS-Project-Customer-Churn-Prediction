name: Churn Prediction CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python -m pytest src/tests/ -v --tb=short

      - name: Run DVC pipeline (data → features → train)
        run: |
          dvc repro

      - name: Check model metrics
        run: |
          python -c "
          import json
          with open('metrics.json') as f:
              m = json.load(f)
          f1 = m.get('f1', 0)
          assert f1 >= 0.65, f'F1 {f1:.4f} below acceptance threshold 0.65'
          print(f'F1 score: {f1:.4f} — PASSED')
          "

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image
        run: docker build -f docker/Dockerfile.api -t churn-api:${{ github.sha }} .

      - name: Build Frontend Docker image
        run: docker build -f docker/Dockerfile.frontend -t churn-frontend:${{ github.sha }} .

      - name: Docker Compose smoke test
        run: |
          docker-compose up -d api
          sleep 20
          curl -f http://localhost:8000/health || exit 1
          docker-compose down
